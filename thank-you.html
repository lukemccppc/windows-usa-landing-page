  <title>Thank You | Windows USA</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:  #0078C1;
      --blue-dark: #005a94;
      --red:   #E31B37;
      --red-dark: #c0152e;
      --white: #ffffff;
      --gray: #6b7280;
      --dark: #1a2332;
      --font: 'DM Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      color: var(--dark);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── STICKY HEADER ─── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      gap: 16px;
    }
    .header-logo img { height: 40px; width: auto; display: block; }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1e30;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/img/hero-flag.avif');
      background-size: cover;
      background-position: center 30%;
      opacity: .45;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, rgba(0,20,50,.75) 0%, rgba(0,20,50,.45) 55%, rgba(0,20,50,.2) 100%);
    }
    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 24px;
      width: 100%;
      text-align: center;
      color: white;
    }

    /* Checkmark circle */
    .ty-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      backdrop-filter: blur(6px);
    }

    .hero-badge {
      display: inline-block;
      background: var(--red);
      color: white;
      font-size: .75rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 4px;
      margin-bottom: 24px;
    }
    .hero-headline {
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
      text-shadow: 0 2px 12px rgba(0,0,0,.3);
      color: white;
    }
    .hero-subhead {
      font-size: 1.15rem;
      opacity: .88;
      max-width: 540px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }
    .hero-trust-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hero-trust-chip {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      color: white;
      font-size: .8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hero-trust-chip svg { flex-shrink: 0; }

    /* ─── TRUST BAR ─── */
    .trust-bar { background: var(--dark); padding: 0 24px; }
    .trust-bar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: stretch;
    }
    .trust-stat {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 22px 24px;
      flex: 1;
      color: white;
      position: relative;
    }
    .trust-stat + .trust-stat::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: rgba(255,255,255,.18);
    }
    .trust-stat-icon { flex-shrink: 0; opacity: .75; }
    .trust-stat-text { min-width: 0; }
    .trust-stat-number {
      font-size: 1.1rem;
      font-weight: 800;
      color: white;
      line-height: 1.2;
      white-space: nowrap;
    }
    .trust-stat-label {
      font-size: .72rem;
      color: rgba(255,255,255,.5);
      margin-top: 2px;
      font-weight: 400;
      white-space: nowrap;
    }

    /* ─── FOOTER ─── */
    footer {
      background: #0d1520;
      color: rgba(255,255,255,.55);
      padding: 32px 24px;
    }
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    footer a { color: rgba(255,255,255,.55); text-decoration: none; }
    footer a:hover { color: white; }
    .footer-logo { opacity: .75; filter: brightness(0) invert(1); height: 32px; }
    .footer-links { display: flex; gap: 20px; font-size: .8rem; flex-wrap: wrap; }
    .footer-copy { font-size: .78rem; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .trust-bar-inner { flex-wrap: wrap; }
      .trust-stat { flex: 0 0 33.333%; }
      .trust-stat + .trust-stat::before { display: none; }
    }

    @media (max-width: 600px) {
      .header-inner { height: 60px; }

      .hero { min-height: 100svh; }
      .hero-inner { padding: 56px 20px; }

      .trust-bar-inner {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .trust-stat {
        flex: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 6px;
        padding: 20px 12px;
        border-top: 1px solid rgba(255,255,255,.1);
      }
      .trust-stat + .trust-stat::before { display: none; }
      .trust-stat:nth-child(1),
      .trust-stat:nth-child(2) { border-top: none; }
      .trust-stat-icon svg { width: 22px; height: 22px; }
      .trust-stat-number { font-size: .95rem; white-space: nowrap; }
      .trust-stat-label { font-size: .67rem; white-space: nowrap; }
      .trust-stat:last-child {
        grid-column: 1 / -1;
        border-top: 1px solid rgba(255,255,255,.1);
        padding: 20px 12px;
      }

      .footer-inner { flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
    }
  </style>
</head>
